name: WeddingApp
options:
  bundleIdPrefix: com.weddingapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: id
  knownRegions:
    - id
    - en

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0

configs:
  Debug: debug
  Release: release

# Project-level settings (safe Xcode recommendations; survives `xcodegen generate`)
settings:
  base:
    DEVELOPMENT_TEAM: LHH9LVRYVY
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

targets:
  WeddingApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    resources:
      - path: Sources/Resources/PrivacyInfo.xcprivacy
      - path: Sources/App/Localization/id.lproj/Localizable.strings
      - path: Sources/App/Localization/en.lproj/Localizable.strings
      - path: Sources/Resources/LaunchScreen.storyboard
      - path: Sources/Resources/Products.storekit
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
    entitlements:
      path: WeddingApp.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development
      configs:
        Release:
          properties:
            aps-environment: production
    info:
      path: Generated/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: LaunchScreen
        GIDClientID: "1008010367829-am6itqilhmatsctp7ckj1flhrkeg77es.apps.googleusercontent.com"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - "com.googleusercontent.apps.1008010367829-am6itqilhmatsctp7ckj1flhrkeg77es"
        UIAppFonts:
          - Poppins-Regular.ttf
          - Poppins-Medium.ttf
          - Poppins-SemiBold.ttf
          - Poppins-Bold.ttf
          - SairaStencilOne-Regular.ttf
          - CormorantGaramond.ttf
        UIBackgroundModes:
          - remote-notification
        NSPhotoLibraryUsageDescription: "Wedding App membutuhkan akses foto untuk mengunggah foto pasangan dan bukti pembayaran."
        NSCameraUsageDescription: "Wedding App membutuhkan akses kamera untuk mengambil foto pasangan dan bukti pembayaran."
        NSContactsUsageDescription: "Wedding App dapat memeriksa izin kontak jika fitur impor tamu dari kontak digunakan."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.weddingapp.ios
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: LHH9LVRYVY
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ONLY_ACTIVE_ARCH: YES
        "EXCLUDED_ARCHS[sdk=iphonesimulator*]": i386
        INFOPLIST_KEY_CFBundleDisplayName: Wedding App
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.lifestyle
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
        Release:
          INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: NO

schemes:
  WeddingApp:
    build:
      targets:
        WeddingApp: all
    run:
      config: Debug
      storeKitConfiguration: Sources/Resources/Products.storekit
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
