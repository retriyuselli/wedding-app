name: WeddingApp
options:
  bundleIdPrefix: com.weddingapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: id
  knownRegions:
    - id
    - en

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0

configs:
  Debug: debug
  Release: release

targets:
  WeddingApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    resources:
      - path: Sources/App/Localization/id.lproj/Localizable.strings
      - path: Sources/App/Localization/en.lproj/Localizable.strings
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
    entitlements:
      path: WeddingApp.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development
      configs:
        Release:
          properties:
            aps-environment: production
    info:
      path: Generated/Info.plist
      properties:
        UILaunchScreen: {}
        GIDClientID: "1008010367829-am6itqilhmatsctp7ckj1flhrkeg77es.apps.googleusercontent.com"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - "com.googleusercontent.apps.1008010367829-am6itqilhmatsctp7ckj1flhrkeg77es"
        UIAppFonts:
          - Poppins-Regular.ttf
          - Poppins-Medium.ttf
          - Poppins-SemiBold.ttf
          - Poppins-Bold.ttf
        UIBackgroundModes:
          - remote-notification
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.weddingapp.ios
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: LHH9LVRYVY
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Wedding App
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.lifestyle
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
        Release:
          INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: NO
