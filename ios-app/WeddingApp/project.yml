name: WeddingApp
options:
  bundleIdPrefix: com.weddingapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

targets:
  WeddingApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    info:
      path: Generated/Info.plist
      properties:
        UILaunchScreen: {}
        UIAppFonts:
          - Poppins-Regular.ttf
          - Poppins-Medium.ttf
          - Poppins-SemiBold.ttf
          - Poppins-Bold.ttf
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.weddingapp.ios
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: LHH9LVRYVY
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Wedding App
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.lifestyle
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
